<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Assign Task - Admin</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: #1c1e21; text-align: center; }
        input, textarea, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #0056b3; }
        .back-link { display: block; text-align: center; margin-top: 15px; color: #65676b; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Assign New Task</h2>
        <form method="POST">
            <input type="text" name="title" placeholder="Enter Task Title" required>
            <textarea name="description" placeholder="Enter Task Details..." rows="3"></textarea>
            
            <label style="font-size: 14px; color: #555;">Assign To User:</label>
            <select name="assigned_to" required>
                <option value="" disabled selected>-- Select a Team Member --</option>
                {% for user in users %}
                    <option value="{{ user.id }}">{{ user.username }} ({{ user.email }})</option>
                {% endfor %}
            </select>
            
            <button type="submit">Assign Task Now</button>
        </form>
        <a href="{{ url_for('dashboard') }}" class="back-link">← Back to Dashboard</a>
    </div>
</body>
</html>
